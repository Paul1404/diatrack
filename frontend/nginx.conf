server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # API proxy to backend
    location /api {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Hashed assets emitted by Vite live under /assets and can be cached forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000" always;
        try_files $uri =404;
    }

    # Other static assets (favicons, manifest, fonts) get a shorter cache.
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webmanifest)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
    }

    # index.html must never be cached, otherwise mobile browsers can hold on
    # to a stale shell that references chunk files which no longer exist
    # after a redeploy. That's the classic SPA white-screen-on-mobile bug.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires off;
    }

    # SPA fallback. Routes that don't match a file fall through to index.html
    # and inherit the no-store policy.
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
