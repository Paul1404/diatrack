<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0052CC" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1D2125" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="description" content="DiaTrack - Diabetes Hardware Tracker zur Überwachung von Sensoren und Kathetern" />
    <title>DiaTrack - Diabetes Hardware Tracker</title>
    <style>
      :root { color-scheme: light dark; }
      html, body {
        margin: 0;
        background-color: #F1F2F4;
        color: #172B4D;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
        -webkit-text-size-adjust: 100%;
      }
      html[data-theme='dark'], html[data-theme='dark'] body {
        background-color: #161A1D;
        color: #E6EDF3;
      }
      @media (prefers-color-scheme: dark) {
        html:not([data-theme]), html:not([data-theme]) body {
          background-color: #161A1D;
          color: #E6EDF3;
        }
      }
      #root { min-height: 100vh; }
      .boot-splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 16px;
        font-size: 14px;
        color: #626F86;
      }
      .boot-splash .spinner {
        width: 28px;
        height: 28px;
        border: 3px solid rgba(0, 82, 204, 0.2);
        border-top-color: #0052CC;
        border-radius: 50%;
        animation: boot-spin 0.8s linear infinite;
      }
      @keyframes boot-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-splash" aria-label="Lädt">
        <div class="spinner" aria-hidden="true"></div>
        <div>DiaTrack lädt…</div>
      </div>
    </div>
    <noscript>
      <div style="padding:24px;text-align:center;">
        DiaTrack benötigt JavaScript. Bitte aktiviere es in deinem Browser.
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
