app = "diatrack"
primary_region = "fra"

kill_signal = "SIGTERM"
kill_timeout = 10

[build]

[env]
  CORS_ORIGINS = "https://diatrack.fly.dev"
  COOKIE_SECURE = "true"

# Required secret — set via:
#   fly secrets set JWT_SECRET=<long-random-string> --app diatrack

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    path = "/api/health"
    timeout = "10s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "diatrack_data"
  destination = "/app/data"
  initial_size = "1gb"
